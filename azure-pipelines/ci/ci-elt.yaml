trigger:
  batch: true
  branches:
    include:
      - main
  paths:
    include:
      - src/workloads/training_pipeline/elt/**
      - src/workloads/training_pipeline/utils/**
      - src/workloads/training_pipeline/main.py
      - src/workloads/training_pipeline/tests/test_elt.py
      - src/workloads/training_pipeline/requirements-ci.txt
      - azure-pipelines/ci/ci-elt.yaml
      - azure-pipelines/templates/python-ci.yaml

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: elt-ci-vars

steps:
  - template: ../templates/python-ci.yaml
    parameters:
      serviceDirectory: 'src/workloads/training_pipeline'
      pythonVersion: '3.14'
      requirementsFile: 'src/workloads/training_pipeline/requirements-ci.txt'
      devRequirementsFile: 'src/workloads/training_pipeline/requirements-ci.txt'
      includeDocker: false