trigger:
  batch: true
  branches:
    include:
      - main
      - feat/*
  paths:
    include:
      - src/terraform/main/**
      - azure-pipelines/ci/ci-terraform.yaml

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: terraform-vars        # <-- automatically exports TF_VAR_* into the environment

steps:
  - checkout: self
    clean: true
    fetchDepth: 1

  - task: AzureCLI@2
    displayName: 'Terraform plan'
    inputs:
      azureSubscription: 'azdo-oidc-ci'
      addSpnToEnvironment: true
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        cd "$(Build.SourcesDirectory)/src/terraform/main"
        chmod +x ./run.sh

        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_TENANT_ID="$tenantId"
        export ARM_OIDC_TOKEN="$idToken"
        export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
        export ARM_USE_OIDC="true"
        export TF_INPUT="false"

        # TF_VAR_location and TF_VAR_alert_email_address are already set
        # from the variable group; no need to export them again.
        ./run.sh --plan --env staging

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Terraform plan'
    inputs:
      targetPath: '$(Build.SourcesDirectory)/src/terraform/main/.plans/staging'
      artifact: 'terraform-plan'