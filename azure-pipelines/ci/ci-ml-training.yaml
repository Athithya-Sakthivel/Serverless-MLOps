# Trigger only when the training workload, shared Python CI template, or the
# shared CI script changes.

trigger:
  batch: true
  branches:
    include:
      - main
      - feat/*
  paths:
    include:
      - src/workloads/train/**
      - azure-pipelines/ci/ci-ml-training.yaml
      - azure-pipelines/templates/python-ci.yaml
      - src/scripts/python_ci.sh

# PRs into main should be validated with the same template.
pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: ml-ci-vars

steps:
  - template: /azure-pipelines/templates/python-ci.yaml
    parameters:
      serviceDirectory: 'src/workloads/train'
      pythonVersion: '3.11'
      requirementsFile: 'src/workloads/train/requirements.txt'
      devRequirementsFile: 'src/workloads/train/requirements-dev.txt'
      includeDocker: false

      # preTestSteps runs after lint/type-check but before pytest.
      # Keep it for any training-specific smoke step you want to exercise
      # during CI without duplicating the shared setup logic.
      preTestSteps:
        - bash: |
            set -euo pipefail
            "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" install-deps
            source "$(Pipeline.Workspace)/.venv/bin/activate"
            python src/workloads/train/train.py
          displayName: 'Train model and register in MLflow'