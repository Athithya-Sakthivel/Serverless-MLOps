# ---------------------------------------------------------------------------
# CI pipeline for the ML training workload.
#
# Triggers when training code, shared utilities, tests, or the CI script
# change. Uses the same Python version as the container (3.14).
# The smoke test step is commented out until Azure/MLflow mocks are in place.
# ---------------------------------------------------------------------------

trigger:
  batch: true
  branches:
    include:
      - main
      - feat/*
  paths:
    include:
      - src/workloads/training_pipeline/train/**
      - src/workloads/training_pipeline/utils/**
      - src/workloads/training_pipeline/main.py
      - src/workloads/training_pipeline/tests/**
      - azure-pipelines/ci/ci-ml-training.yaml
      - azure-pipelines/templates/python-ci.yaml
      - src/scripts/python_ci.sh

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: ml-ci-vars

steps:
  - template: /azure-pipelines/templates/python-ci.yaml
    parameters:
      serviceDirectory: 'src/workloads/training_pipeline'
      pythonVersion: '3.14'
      requirementsFile: 'src/workloads/training_pipeline/requirements-ci.txt'
      devRequirementsFile: 'src/workloads/training_pipeline/requirements-ci.txt'
      includeDocker: false
      # preTestSteps intentionally empty – add smoke test only after mocking
      # Azure and MLflow dependencies.