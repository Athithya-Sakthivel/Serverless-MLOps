# Trigger only when the training workload or shared Python template changes.
trigger:
  batch: true
  branches:
    include:
      - main
      - feat/*
  paths:
    include:
      - src/workloads/train/**
      - azure-pipelines/ci/ci-ml-training.yaml
      - azure-pipelines/templates/python-ci.yaml

# PRs into main should be validated with the same template.
pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: ml-ci-vars

steps:
  - template: /azure-pipelines/templates/python-ci.yaml
    parameters:
      serviceDirectory: 'src/workloads/train'
      pythonVersion: '3.11'
      requirementsFile: 'src/workloads/train/requirements.txt'
      devRequirementsFile: 'src/workloads/train/requirements-dev.txt'
      includeDocker: false

      # preTestSteps runs after lint/type-check but before pytest.
      # This is where training can happen if you want model registration
      # to be exercised before tests complete.
      preTestSteps:
        - bash: |
            set -euo pipefail
            source .venv/bin/activate
            python src/workloads/train/train.py
          displayName: 'Train model and register in MLflow'