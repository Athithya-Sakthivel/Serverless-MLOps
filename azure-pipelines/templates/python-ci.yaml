# ---------------------------------------------------------------------------
# Reusable CI template for Python services.
#
# Every invocation goes through `bash python_ci.sh <command>` so that the
# script file does NOT need the execute bit. This avoids exit code 126
# ("Permission denied") when the repository checkout gives the file mode 0644.
#
# Two cache layers:
#   1. pip download cache – avoids re-downloading wheels.
#   2. virtualenv cache – avoids reinstalling the dependency graph when
#      requirements files are unchanged.
#
# Cache@2 supports file-content-based key segments via the `${{ }}` syntax
# in the key string. The cache key changes automatically when the referenced
# files change, so no manual version bumps are needed.
# ---------------------------------------------------------------------------

parameters:
  - name: serviceDirectory
    type: string

  - name: pythonVersion
    type: string
    default: '3.14'

  - name: requirementsFile
    type: string

  - name: devRequirementsFile
    type: string

  - name: includeDocker
    type: boolean
    default: false

  - name: containerRepository
    type: string
    default: ''

  - name: dockerfilePath
    type: string
    default: ''

  - name: preTestSteps
    type: stepList
    default: []

steps:
  - checkout: self
    clean: true
    fetchDepth: 1

  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ parameters.pythonVersion }}'
    inputs:
      versionSpec: '${{ parameters.pythonVersion }}'
      architecture: 'x64'

  # Cache layer 1: pip's HTTP/wheel cache.
  # Even when the virtualenv cache misses, this saves re-downloading packages.
  - task: Cache@2
    displayName: 'Restore pip cache'
    inputs:
      key: 'pip | "$(Agent.OS)" | "python-${{ parameters.pythonVersion }}" | ${{ parameters.requirementsFile }} | ${{ parameters.devRequirementsFile }}'
      restoreKeys: |
        pip | "$(Agent.OS)" | "python-${{ parameters.pythonVersion }}"
        pip | "$(Agent.OS)"
      path: '$(Pipeline.Workspace)/pip-cache'

  # Cache layer 2: the entire virtualenv.
  # On an exact cache hit, install-deps becomes a ~1-second no-op.
  - task: Cache@2
    displayName: 'Restore virtualenv'
    inputs:
      key: 'venv | "$(Agent.OS)" | "python-${{ parameters.pythonVersion }}" | ${{ parameters.requirementsFile }} | ${{ parameters.devRequirementsFile }}'
      path: '$(Pipeline.Workspace)/.venv'
      cacheHitVar: 'VENV_CACHE_RESTORED'

  # All subsequent steps invoke the CI script through `bash` explicitly.
  # This avoids exit code 126 when the file lacks the execute bit after checkout.

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" install-deps
    displayName: 'Install dependencies'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'
      REQUIREMENTS_FILE: '${{ parameters.requirementsFile }}'
      DEV_REQUIREMENTS_FILE: '${{ parameters.devRequirementsFile }}'

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" ruff-lint
    displayName: 'Ruff lint'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" ruff-format
    displayName: 'Ruff format check'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" typecheck
    displayName: 'basedpyright type-check'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  - ${{ each step in parameters.preTestSteps }}:
    - ${{ step }}

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" run-tests
    displayName: 'Run tests'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results.xml'
      searchFolder: '$(Build.SourcesDirectory)'
      testRunTitle: '${{ parameters.serviceDirectory }} tests'

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" pip-audit
    displayName: 'Dependency vulnerability audit'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  - bash: |
      set -euo pipefail
      bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" trivy-fs
    displayName: 'Trivy filesystem scan'
    env:
      SERVICE_DIRECTORY: '${{ parameters.serviceDirectory }}'

  # Docker steps only run when includeDocker is true.
  - ${{ if eq(parameters.includeDocker, true) }}:
    - task: AzureCLI@2
      displayName: 'Authenticate Docker to ACR'
      condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
      inputs:
        azureSubscription: 'azdo-oidc-ci'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail
          bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" docker-login
      env:
        CONTAINER_REGISTRY: '$(containerRegistry)'

    - bash: |
        set -euo pipefail
        bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" build-image
      displayName: 'Build container image'
      env:
        CONTAINER_REGISTRY: '$(containerRegistry)'
        CONTAINER_REPOSITORY: '${{ parameters.containerRepository }}'
        DOCKERFILE_PATH: '${{ parameters.dockerfilePath }}'

    - bash: |
        set -euo pipefail
        bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" scan-image
      displayName: 'Scan container image'
      env:
        CONTAINER_REGISTRY: '$(containerRegistry)'
        CONTAINER_REPOSITORY: '${{ parameters.containerRepository }}'

    - task: AzureCLI@2
      displayName: 'Push image and generate manifest'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      inputs:
        azureSubscription: 'azdo-oidc-ci'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail
          bash "$(Build.SourcesDirectory)/src/scripts/python_ci.sh" push-image-and-manifest
      env:
        CONTAINER_REGISTRY: '$(containerRegistry)'
        CONTAINER_REPOSITORY: '${{ parameters.containerRepository }}'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish deploy manifest'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/deploy-manifest'
        artifact: 'deploy-manifest'
        publishLocation: 'pipeline'