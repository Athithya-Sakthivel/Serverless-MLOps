parameters:
  - name: containerAppName
    type: string
  - name: resourceGroup
    type: string
  - name: image
    type: string
  - name: canarySteps
    type: object
    default: [10, 50]          # traffic percentages
  - name: k6ScriptPath
    type: string
    default: 'tests/load/k6-script.js'
  - name: healthPath
    type: string
    default: '/health'

steps:
  - checkout: self
    clean: true
    fetchDepth: 1

  - task: AzureCLI@2
    displayName: 'Deploy new revision (0% traffic)'
    inputs:
      azureSubscription: 'azdo-oidc-cd'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -euo pipefail
        az containerapp update \
          -n "${{ parameters.containerAppName }}" \
          -g "${{ parameters.resourceGroup }}" \
          --image "${{ parameters.image }}" \
          --set-active-revisions-mode multiple \
          --revision-suffix v$(Build.BuildId) \
          --ingress-traffic-weight latest=0 \
          --output none

        echo "Old revision name captured for rollback"
        OLD_REVISION="$(az containerapp revision list \
          -n "${{ parameters.containerAppName }}" \
          -g "${{ parameters.resourceGroup }}" \
          --query "reverse(sort_by([?properties.active], &name))[0].name" -o tsv)"
        echo "##vso[task.setvariable variable=oldRevision]$OLD_REVISION"

  - ${{ each weight in parameters.canarySteps }}:
    - task: AzureCLI@2
      displayName: 'Set canary traffic to ${{ weight }}%'
      inputs:
        azureSubscription: 'azdo-oidc-cd'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail
          az containerapp ingress traffic set \
            -n "${{ parameters.containerAppName }}" \
            -g "${{ parameters.resourceGroup }}" \
            --traffic-weight latest=${{ weight }} \
            --revision-weight $(oldRevision)=$((100 - ${{ weight }})) \
            --output none

    - bash: |
        set -euo pipefail
        curl -sL https://github.com/grafana/k6/releases/download/v0.47.0/k6-v0.47.0-linux-amd64.tar.gz | tar xz
        sudo mv k6-v0.47.0-linux-amd64/k6 /usr/local/bin/k6
      displayName: 'Install k6'

    - bash: |
        set -euo pipefail
        FQDN="$(az containerapp show \
          -n "${{ parameters.containerAppName }}" \
          -g "${{ parameters.resourceGroup }}" \
          --query properties.configuration.ingress.fqdn -o tsv)"
        echo "APP_FQDN=$FQDN"
        k6 run "$(Build.SourcesDirectory)/${{ parameters.k6ScriptPath }}" \
          -e APP_FQDN="$FQDN" \
          --summary-export=k6-summary-${{ weight }}.json || true
      displayName: 'Run k6 load test (${{ weight }}%)'

    - task: PowerShell@2
      displayName: 'Evaluate canary ${{ weight }}% metrics'
      inputs:
        targetType: 'inline'
        script: |
          $summary = Get-Content k6-summary-${{ weight }}.json | ConvertFrom-Json
          $thresholdsPassed = $true
          if ($summary.metrics.'http_req_duration'.'p(95)' -ge 200) { $thresholdsPassed = $false }
          if ($summary.metrics.errors.rate -ge 0.01) { $thresholdsPassed = $false }
          if (-not $thresholdsPassed) {
            Write-Host "Canary at ${{ weight }}% FAILED thresholds"
            exit 1
          }
      condition: succeeded()

  - task: AzureCLI@2
    displayName: 'Promote to 100%'
    condition: succeeded()
    inputs:
      azureSubscription: 'azdo-oidc-cd'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az containerapp ingress traffic set \
          -n "${{ parameters.containerAppName }}" \
          -g "${{ parameters.resourceGroup }}" \
          --traffic-weight latest=100 $(oldRevision)=0

  - task: AzureCLI@2
    displayName: 'Rollback on any failure'
    condition: failed()
    inputs:
      azureSubscription: 'azdo-oidc-cd'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az containerapp ingress traffic set \
          -n "${{ parameters.containerAppName }}" \
          -g "${{ parameters.resourceGroup }}" \
          --traffic-weight $(oldRevision)=100 latest=0