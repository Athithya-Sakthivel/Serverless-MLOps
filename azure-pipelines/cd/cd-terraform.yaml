trigger: none

resources:
  pipelines:
    - pipeline: ciTerraform
      source: Serverless-MLOps-terraform-ci
      branch: main
      trigger: none

pool:
  vmImage: ubuntu-24.04

jobs:
  - deployment: apply_terraform
    displayName: 'Plan and apply Terraform'
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
              clean: true
              fetchDepth: 1

            - task: AzureCLI@2
              displayName: 'Terraform plan and apply'
              inputs:
                azureSubscription: 'azdo-oidc-cd'
                addSpnToEnvironment: true
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  cd "$(Build.SourcesDirectory)/src/terraform/main"
                  chmod +x ./run.sh

                  # OIDC credentials from the CD service connection
                  export ARM_CLIENT_ID="${servicePrincipalId}"
                  export ARM_TENANT_ID="${tenantId}"
                  export ARM_OIDC_TOKEN="${idToken}"
                  export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                  export ARM_USE_OIDC="true"
                  export ARM_USE_CLI="false"

                  # Force backend reinitialization with the CD identity
                  ./run.sh --init --env prod --reconfigure

                  # Plan with the CD identity
                  ./run.sh --plan --env prod

                  # Apply that plan
                  ./run.sh --apply-plan .plans/prod/prod.tfplan --env prod