# ==============================================================================
# CD Terraform – Apply Infrastructure Plan
#
# Manually triggered after ci-terraform produces a reviewed plan artifact.
# Uses the pipeline resource picker to select which CI run's plan to apply.
# Applies the EXACT plan artifact with no re-plan.
# ==============================================================================

trigger: none

resources:
  pipelines:
    - pipeline: ciTerraform                              # Alias used within this pipeline
      source: Serverless-MLOps-terraform-ci              # Exact pipeline name in Azure DevOps
      branch: main                                       # Default branch for artifact resolution
      trigger: none                                      # Do not auto-trigger on CI completion

pool:
  vmImage: ubuntu-24.04

variables:
  - group: 'terraform-cd-vars'

jobs:
  - deployment: apply_terraform
    displayName: 'Apply Terraform plan to production'
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
              clean: true
              fetchDepth: 1

            # Downloads automatically in deployment jobs, but explicit for clarity.
            # When running manually, use the Resources picker to select the CI run.
            - download: ciTerraform
              artifact: terraform-plan
              displayName: 'Download Terraform plan artifact'

            - task: AzureCLI@2
              displayName: 'Apply Terraform plan'
              inputs:
                azureSubscription: 'azdo-oidc-cd'
                addSpnToEnvironment: true
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  cd "$(Build.SourcesDirectory)/src/terraform/main"
                  chmod +x ./run.sh

                  export ARM_CLIENT_ID="${servicePrincipalId}"
                  export ARM_TENANT_ID="${tenantId}"
                  export ARM_OIDC_TOKEN="${idToken}"
                  export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                  export ARM_USE_OIDC="true"
                  export ARM_USE_CLI="false"
                  export TF_IN_AUTOMATION="true"
                  export TF_INPUT="false"

                  # Locate the plan file from the downloaded artifact
                  PLAN_DIR="$(Pipeline.Workspace)/ciTerraform/terraform-plan"
                  PLAN_FILE=$(find "$PLAN_DIR" -maxdepth 1 -name "*.tfplan" -type f | head -n1)

                  if [[ -z "$PLAN_FILE" ]]; then
                    echo "ERROR: No .tfplan file found in $PLAN_DIR"
                    echo "Contents of artifact directory:"
                    find "$PLAN_DIR" -type f || true
                    exit 1
                  fi

                  echo "Applying plan: $PLAN_FILE"
                  ./run.sh --apply-plan "$PLAN_FILE" --env prod